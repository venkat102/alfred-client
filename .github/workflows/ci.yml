# CI for alfred_client.
#
# One job: lint (ruff). No pytest job because this repo's Python tests
# are bench-executed (`bench --site <site> execute ...`) and require a
# full Frappe + MariaDB + Redis container stack plus site setup. That
# would be fragile + slow; we run those tests locally + in integration
# environments.
#
# The Playwright frontend-tests/ suite also runs locally - it needs the
# processing app + Ollama + a populated site. Gated behind
# ALFRED_RUN_SLOW_TESTS=1.
#
# What this CI DOES catch: import errors, formatting violations, and
# lint regressions in the Python parts of the app. That's the common
# failure class on a reviewed PR.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check alfred_client/
      # Format check not enforced on CI today - pre-commit hooks format
      # staged files as they're touched, repo normalises organically.
